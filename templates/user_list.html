<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Users List</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #09090b, #18181b, #27272a); color: white; min-height: 100vh; }
        .container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; max-width: 1000px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        h2 { margin: 0; font-weight: 400; letter-spacing: 1px; color: gold;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.05); color: #92FE9D; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .btn-back { background: rgba(255, 255, 255, 0.1); color: white; padding: 8px 15px; text-decoration: none; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;}
        .btn-back:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-view { background: linear-gradient(90deg, #6366f1, #a855f7); color: white; padding: 6px 12px; text-decoration: none; border-radius: 6px; font-size: 0.9rem; font-weight: bold;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>👥 All Premium Users</h2>
            <a href="/dashboard" class="btn-back">⬅️ Back to Dashboard</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Telegram ID</th>
                    <th>Valid Till (Expiry)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td style="font-weight: bold; font-family: monospace;">{{ u.user_id }}</td>
                    <td>
                        {% if u.subscription_end %}
                            {{ u.subscription_end.strftime('%d-%m-%Y %H:%M') }}
                        {% else %}
                            Unknown
                        {% endif %}
                    </td>
                    <td><a href="/admin/user/{{ u.user_id }}" class="btn-view">🔍 View Activity</a></td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" style="text-align: center; padding: 30px; opacity: 0.5;">No Premium Users Found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
