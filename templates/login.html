<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #09090b, #18181b, #27272a);
            color: white; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 40px; width: 350px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        input {
            width: 90%; padding: 12px; margin: 15px 0; border-radius: 10px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; outline: none; font-size: 1rem;
        }
        button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(90deg, #6366f1, #a855f7); color: white;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .error { color: #f87171; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Gateway</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="tg_id" placeholder="Telegram ID" required>
            <input type="password" name="password" placeholder="Bot Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
