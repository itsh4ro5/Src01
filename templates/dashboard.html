<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #09090b, #18181b, #27272a); color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 30px; max-width: 1000px; margin: auto;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;}
        .stats-grid { display: flex; gap: 20px; margin: 30px 0; }
        .stat-card {
            flex: 1; background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value { font-size: 2.5rem; font-weight: bold; background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden;}
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.05); color: #a855f7; }
        .btn-logout { background: #ef4444; color: white; padding: 8px 15px; text-decoration: none; border-radius: 8px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Welcome, {{ admin_name }}</h2>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Users</h3><div class="stat-value">{{ total_users }}</div></div>
            <div class="stat-card"><h3>Premium Users</h3><div class="stat-value">{{ premium_users }}</div></div>
        </div>

        <h3>🔴 Live Admin Activity</h3>
        <table>
            <tr><th>Time</th><th>Admin Name</th><th>Action</th><th>Target</th></tr>
            {% for log in logs %}
            <tr>
                <td>{{ log.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>{{ log.admin_name }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.target }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
